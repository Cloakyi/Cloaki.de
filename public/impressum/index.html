<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum - Cloaki</title>
  <link rel="icon" href="../Unbenannt.png" type="image/png">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="theme-switcher" id="themeSwitcher"><i>🌙</i></div>

  <div class="profile-container">
    <div class="profile-content">
      <h2>Impressum</h2>
      <p><strong>Angaben gemäß § 5 DDG:</strong></p>
      <p>Paul Häuser<br>Eichenstraße 59<br>07549 Gera</p>
      
      <p><strong>Kontakt:</strong><br>
      E-Mail: <a href="mailto:owner@cloaki.de">Owner@cloaki.de</a></p>

      </div>
    
    <div class="description">
      <div class="footer-bubble-content">
        <a href="/">Zurück zum Profil</a>
        <a href="../datenschutz/">Datennutzung</a>
        <a href="../haftung/">Haftung</a>
      </div>
    </div>
  </div>

  <script>
    /* Das Theme-Script muss auf jede Seite, damit die Sonne/Mond Logik überall geht */
    const themeSwitcher = document.getElementById('themeSwitcher');
    const body = document.body;
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    if (getCookie('theme') === 'light') {
      body.classList.add('light-mode');
      themeSwitcher.innerHTML = '<i>☀️</i>';
    }
    themeSwitcher.addEventListener('click', () => {
      body.classList.toggle('light-mode');
      const isLight = body.classList.contains('light-mode');
      themeSwitcher.innerHTML = isLight ? '<i>☀️</i>' : '<i>🌙</i>';
      document.cookie = "theme=" + (isLight ? "light" : "dark") + "; path=/; max-age=31536000";
    });
  </script>
</body>
</html>
