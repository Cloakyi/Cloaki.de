<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord-Regeln - Cloaki</title>
  <script src="/js/app-core.js"></script>
  <script src="/js/background-animation.js" defer></script>
  <link rel="icon" type="image/png" href="/bilder/Profile.webp">
  <link rel="stylesheet" href="/style.css">

  <!-- Import Map for @material/web ES modules -->
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "/lib/@material/web/",
      "@lit/reactive-element": "/lib/@lit/reactive-element/reactive-element.js",
      "@lit/reactive-element/": "/lib/@lit/reactive-element/",
      "@lit-labs/ssr-dom-shim": "/lib/@lit-labs/ssr-dom-shim/index.js",
      "lit": "/lib/lit/index.js",
      "lit/": "/lib/lit/",
      "lit-html": "/lib/lit-html/lit-html.js",
      "lit-html/": "/lib/lit-html/",
      "lit-element/": "/lib/lit-element/",
      "lit-element": "/lib/lit-element/index.js",
      "tslib": "/lib/tslib/tslib.es6.mjs"
    }
  }
  </script>
  <script type="module">
    import '@material/web/icon/icon.js';
    import '@material/web/iconbutton/icon-button.js';
    import '@material/web/ripple/ripple.js';
  </script>
</head>

<body>
  <script>
    if (document.cookie.includes('theme=light')) document.body.classList.add('light-mode');
    const a11yMode = localStorage.getItem('cloaki_a11y_mode');
    if (a11yMode && a11yMode !== 'normal') document.documentElement.classList.add('a11y-mode-' + a11yMode);
    const a11yZoom = localStorage.getItem('cloaki_a11y_zoom');
    if (a11yZoom) document.body.style.zoom = a11yZoom / 100;
  </script>
  <div id="global-loader">
    <div class="loader-logo"></div>
  </div>
  <svg id="a11y-svg-filters" aria-hidden="true" style="width:0;height:0;position:absolute;">
    <filter id="filter-protanopia">
      <feColorMatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0" />
    </filter>
    <filter id="filter-deuteranopia">
      <feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0" />
    </filter>
    <filter id="filter-tritanopia">
      <feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0" />
    </filter>
  </svg>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('global-loader');
        if (loader) loader.classList.add('hidden');
      }, 150);
    });
  </script>
  <div class="subpage-nav">
    <md-icon-button aria-label="Zurück zur Hauptseite" onclick="triggerStingerAndNavigate('/')">
      <md-icon>arrow_back</md-icon>
    </md-icon-button>
    <div></div>
  </div>

  <div class="profile-container">
    <div class="profile-content" style="text-align: center;">
      <h1><md-icon style="font-size: 32px; --md-icon-size: 32px; vertical-align: middle;">menu_book</md-icon>
        Discord-Regeln</h1>
      <p>Wähle eine Version der Regeln aus:</p>

      <div class="accounts" style="margin-bottom: 20px;">
        <a href="/discord-agb/kurz/" class="account-button" style="justify-content: center;">
          <md-ripple></md-ripple>
          <md-icon>auto_awesome</md-icon> Kurzfassung
        </a>
        <a href="/discord-agb/umfassend/" class="account-button" style="justify-content: center;">
          <md-ripple></md-ripple>
          <md-icon>description</md-icon> Ausführliche Fassung
        </a>
      </div>
    </div>

    <div class="description">
      <div class="footer-bubble-content">

        <a href="../impressum/">Impressum</a>
        <a href="../datenschutz/">Datenschutz</a>
        <a href="../haftung/">Haftung</a>
      </div>
    </div>
  </div>

  <script src="/js/legal-modals.js" defer></script>
  <script src="/js/cookie-banner.js" defer></script>
  <script src="/js/accessibility.js" defer></script>


</body>

</html>
