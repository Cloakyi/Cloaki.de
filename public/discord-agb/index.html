<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord-Regeln - Cloaki</title>
  <link rel="icon" type="image/png" href="../Unbenannt.png">
  <link rel="stylesheet" href="../style.css">

  <!-- Import Map for @material/web ES modules -->
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "/lib/@material/web/",
      "@lit/reactive-element": "/lib/@lit/reactive-element/reactive-element.js",
      "@lit/reactive-element/": "/lib/@lit/reactive-element/",
      "@lit-labs/ssr-dom-shim": "/lib/@lit-labs/ssr-dom-shim/index.js",
      "lit": "/lib/lit/index.js",
      "lit/": "/lib/lit/",
      "lit-html": "/lib/lit-html/lit-html.js",
      "lit-html/": "/lib/lit-html/",
      "lit-element/": "/lib/lit-element/",
      "lit-element": "/lib/lit-element/index.js",
      "tslib": "/lib/tslib/tslib.es6.mjs"
    }
  }
  </script>
  <script type="module">
    import '@material/web/icon/icon.js';
    import '@material/web/iconbutton/icon-button.js';
    import '@material/web/ripple/ripple.js';
  </script>
</head>
<body>
  <div class="theme-switcher" id="themeSwitcher" aria-label="Theme wechseln">
    <md-icon-button id="themeBtn" aria-label="Theme wechseln">
      <md-icon id="themeIcon">dark_mode</md-icon>
    </md-icon-button>
  </div>

  <div class="profile-container">
    <div class="profile-content" style="text-align: center;">
      <h1><md-icon style="font-size: 32px; vertical-align: middle;">menu_book</md-icon> Discord-Regeln</h1>
      <p>Wähle eine Version der Regeln aus:</p>

      <div class="accounts" style="margin-bottom: 20px;">
        <a href="/discord-agb/kurz/" class="account-button" style="justify-content: center;">
          <md-ripple></md-ripple>
          <md-icon>auto_awesome</md-icon> Kurzfassung
        </a>
        <a href="/discord-agb/umfassend/" class="account-button" style="justify-content: center;">
          <md-ripple></md-ripple>
          <md-icon>description</md-icon> Ausführliche Fassung
        </a>
      </div>
    </div>

    <div class="description">
      <div class="footer-bubble-content">
        <a href="/">Zurück</a>
        <a href="../impressum/">Impressum</a>
        <a href="../datenschutz/">Datenschutz</a>
        <a href="../haftung/">Haftung</a>
      </div>
    </div>
  </div>

  <script>
    const themeSwitcher = document.getElementById('themeSwitcher');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
    }
    if (getCookie('theme') === 'light') {
      body.classList.add('light-mode');
      if (themeIcon) themeIcon.textContent = 'light_mode';
    }
    themeSwitcher.addEventListener('click', () => {
      body.classList.toggle('light-mode');
      const isLight = body.classList.contains('light-mode');
      if (themeIcon) themeIcon.textContent = isLight ? 'light_mode' : 'dark_mode';
      document.cookie = "theme=" + (isLight ? "light" : "dark") + "; path=/; max-age=31536000";
    });
  </script>
</body>
</html>
