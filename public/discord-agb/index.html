<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord-Regelübersicht</title>
  <link rel="icon" href="Unbenannt.png" type="image/png" />
  <style>
    :root {
      --bg-gradient-start: #2773a8;
      --bg-gradient-end: #9a30a1;
      --bubble-bg: rgba(0, 0, 0, 0.3);
      --text-color: #ffffff;
      --highlight-color: #ffe082;
      --profile-bg: rgba(0, 0, 0, 0.25);
      --shadow-color: rgba(0, 0, 0, 0.4);
      --link-color: #ffe082;
      --link-hover: #ffffff;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(to bottom right, var(--bg-gradient-start), var(--bg-gradient-end));
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      font-family: sans-serif;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      width: 95%;
      padding: 2rem;
      box-sizing: border-box;
    }

    h1 {
      color: var(--highlight-color);
      margin-bottom: 0.5rem;
    }

    p {
      margin-top: 0;
      font-size: 1.1rem;
    }

    .bubble-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 2rem;
    }

    .bubble {
      background: var(--bubble-bg);
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-decoration: none;
      color: var(--text-color);
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 150px;
    }

    .bubble:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
      cursor: pointer;
    }

    @media screen and (max-width: 768px) and (orientation: portrait) {
      .bubble-grid {
        grid-template-columns: 1fr;
      }

      .bubble {
        font-size: 1.1rem;
        padding: 2rem 1rem;
      }
    }

    .footer-bubble {
      margin-top: 3rem;
    }

    .footer-bubble-content {
      background: var(--profile-bg);
      border-radius: 20px;
      padding: 1rem 2rem;
      box-shadow: 0 0 8px var(--shadow-color);
      text-align: center;
      color: var(--text-color);
      font-size: 0.95rem;
      display: inline-block;
    }

    .footer-bubble-content a {
      color: var(--link-color);
      margin: 0 0.8rem;
      text-decoration: none;
    }

    .footer-bubble-content a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .footer-bubble-content {
        font-size: 0.85rem;
        padding: 0.8rem 1rem;
      }

      .footer-bubble-content a {
        display: block;
        margin: 0.3rem 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📘 Übersicht: Discord-Regeln</h1>
    <p>Wähle, welche Version du dir ansehen möchtest:</p>
    <div class="bubble-grid">
      <a href="/discord-agb/kurz/" class="bubble">✨ Kurzfassung anzeigen</a>
      <a href="/discord-agb/umfassend/" class="bubble">📜 Ausführliche Fassung</a>
    </div>
    <div class="footer-bubble">
      <div class="footer-bubble-content">
        <a href="/impressum/">Impressum</a>
        <a href="/datenschutz/">Datennutzung</a>
        <a href="/haftung/">Haftungsausschluss</a>
      </div>
    </div>
  </div>
</body>
</html>
